<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb" />
      <stop offset="50%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#0891b2" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa" />
      <stop offset="50%" style="stop-color:#c084fc" />
      <stop offset="100%" style="stop-color:#67e8f9" />
    </linearGradient>
    <radialGradient id="logoCtr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc" />
      <stop offset="100%" style="stop-color:#60a5fa" />
    </radialGradient>
    <!-- Blob glows matching the website -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.45" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Animated-style blobs (static in PNG) -->
  <ellipse cx="120" cy="120" rx="420" ry="380" fill="url(#blob1)" />
  <ellipse cx="1080" cy="530" rx="380" ry="340" fill="url(#blob2)" />
  <ellipse cx="780" cy="260" rx="320" ry="300" fill="url(#blob3)" />

  <!-- Logo icon (scaled from 200x200 viewBox to ~130px, centered at x=120 y=315) -->
  <g transform="translate(90, 250) scale(0.65)">
    <!-- Network connections -->
    <g stroke="url(#logoGrad)" stroke-width="2" fill="none" opacity="0.4">
      <line x1="100" y1="60" x2="130" y2="100" />
      <line x1="130" y1="100" x2="100" y2="140" />
      <line x1="100" y1="140" x2="70" y2="100" />
      <line x1="70" y1="100" x2="100" y2="60" />
      <line x1="100" y1="60" x2="100" y2="140" />
      <line x1="70" y1="100" x2="130" y2="100" />
    </g>
    <!-- O ring -->
    <circle cx="100" cy="100" r="65" fill="none" stroke="url(#logoGrad)" stroke-width="18" />
    <!-- Nodes -->
    <circle cx="100" cy="60" r="10" fill="url(#logoGrad)" />
    <circle cx="130" cy="100" r="10" fill="url(#logoCtr)" />
    <circle cx="100" cy="140" r="10" fill="url(#logoGrad)" />
    <circle cx="70" cy="100" r="10" fill="url(#logoCtr)" />
    <!-- Center node -->
    <circle cx="100" cy="100" r="12" fill="url(#logoCtr)" />
    <circle cx="100" cy="100" r="5" fill="white" opacity="0.4" />
    <!-- Highlights -->
    <circle cx="100" cy="60" r="4" fill="white" opacity="0.4" />
    <circle cx="130" cy="100" r="4" fill="white" opacity="0.4" />
    <circle cx="100" cy="140" r="4" fill="white" opacity="0.4" />
    <circle cx="70" cy="100" r="4" fill="white" opacity="0.4" />
  </g>

  <!-- Wordmark: "Locorda" -->
  <text x="240" y="340"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="96"
    font-weight="800"
    fill="white"
    letter-spacing="-2">Locorda</text>

  <!-- Divider line -->
  <rect x="240" y="368" width="700" height="3" rx="2" fill="white" opacity="0.25" />

  <!-- Tagline -->
  <text x="240" y="415"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="30"
    font-weight="400"
    fill="white"
    opacity="0.9">Offline-first Flutter apps — BYOB, no central server</text>

  <!-- Sub-tagline -->
  <text x="240" y="460"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="300"
    fill="white"
    opacity="0.65">RDF · CRDTs · Unhosted · Solid · Google Drive</text>

  <!-- Domain badge bottom right -->
  <text x="1160" y="598"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="500"
    fill="white"
    opacity="0.5"
    text-anchor="end">locorda.dev</text>
</svg>
