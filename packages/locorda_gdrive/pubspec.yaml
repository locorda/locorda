name: locorda_gdrive
description: Locorda Google Drive - Google Drive backend and authentication for locorda
version: 0.1.0-dev
homepage: https://locorda.dev/
repository: https://github.com/locorda/locorda
issue_tracker: https://github.com/locorda/locorda/issues
publish_to: none
publisher: locorda.dev

topics:
  - google-drive
  - authentication
  - oauth2

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  logging: ^1.3.0
  http: ^1.2.0
  google_sign_in: ^6.2.2
  crypto: ^3.0.3
  
  # Locorda dependencies
  locorda_core:
    path: ../locorda_core
  locorda_ui:
    path: ../locorda_ui
  locorda_worker:
    path: ../locorda_worker
  
  # RDF dependencies
  rdf_core: ^0.9.24

  # Google Drive API
  googleapis: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ">=5.1.1 <7.0.0"

flutter:
  generate: true
